name: Node.js CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Get the empty runner and download your code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Install Node.js so it understands 'npm' commands
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Clean install all dependencies (Express, Jest, Supertest)
      - name: Install Dependencies
        run: npm ci

      # 4. Run the automated tests!
      - name: Execute Jest Tests
        run: npm test
